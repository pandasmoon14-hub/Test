staleness_check_procedure: >
  When any doctrine file is revised:
  1. Find all prompts in this manifest referencing that file.
  2. Set stale: true on each affected prompt.
  3. Set stale_reason describing what changed.
  4. Block any conversion using a stale prompt until the prompt is reviewed
     against the new doctrine and stale is reset to false.
  5. Log the staleness event in data/exceptions/ with: doctrine file name,
     revision date, and list of affected prompt names.
