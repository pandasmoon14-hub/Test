version: "0.1"
purpose: >
  Tracks which doctrine files each conversion prompt references and the version
  those files were last validated against. When a governing doctrine file is
  revised, prompts referencing it are marked stale and must be regenerated
  before further conversions run.

governance_rule: >
  No conversion prompt may reference a doctrine file marked
  "Planned — Core Now" or "Planned — Soon After".
  Only files at "Draft — Core Now" or later may be referenced.
  If a prompt is stale (governing file revised after last_validated_against),
  conversions using that prompt must be escalated until the prompt is updated.
  Staleness events must be logged in data/exceptions/.

prompts:

  batch_a_chassis_prompt_v0_1:
    file: configs/prompts/batch_a_chassis_prompt_v0_1.md
    governing_doctrine_files:
      - file: Doctrine/batchA/batchA_02_player_chassis_doctrine.md
        status: "Draft — Core Now"
        last_validated_against: "2024-01"
      - file: Doctrine/batchA/batchA_03_resolution_framework.md
        status: "Draft — Core Now"
        last_validated_against: "2024-01"
      - file: Doctrine/batchA/batchA_04_attribute_and_derived_stat_architecture.md
        status: "Draft — Core Now"
        last_validated_against: "2024-01"
      - file: Doctrine/batchA/batchA_15_conversion_invariants.md
        status: "Draft — Core Now"
        last_validated_against: "2024-01"
    stale: false
    stale_reason: ""
    conversion_gate_satisfied: true
    notes: >
      Governs player chassis and stat conversion.
      Re-validate when batchA_02, batchA_03, batchA_04, or batchA_15 are revised.

