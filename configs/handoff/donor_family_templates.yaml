    label: Companion Summon Pet
    description: Companion/summon systems with shared actions and growth tracks.
    priority: 72
    detection_signals: [pet statblocks, summon slots, companion progression]
    expected_construct_families: [creature_npc_bestiary_companion, player_chassis_and_character_creation, progression_advancement_growth, ability_power_spell_technique]
    packet_selection_targets: [companion creation, command actions, progression tables]
    extraction_risks: [statblock under-parsing, feature table flattening]
    likely_quarantine_reasons: [ownership/action economy conflicts]
    conversion_prompt_additions: [separate companion chassis from flavor identities]
    review_notes: [named companions remain source-local]
