    packet_selection_targets: [domain turn cycle, faction mechanics, governance tables]
    extraction_risks: [cross-table dependency, terminology drift]
    likely_quarantine_reasons: [macro-scale assumptions incompatible with base loop]
    conversion_prompt_additions: [normalize turn cadence and resource ledgers]
    review_notes: [named realms and political entities are source-local]
    escalation_owner_hint: domain_systems_owner
  mass_battle_war_campaign:
    template_id: mass_battle_war_campaign
    label: Mass Battle War Campaign
    description: Army-scale combat and campaign warfare procedures.
    priority: 69
    detection_signals: [unit formations, battle rounds, campaign fronts]
    expected_construct_families: [mass_battle_war_campaign, damage_condition_effect_survivability, scene_mission_adventure_scenario, domain_faction_kingdom_management]
    packet_selection_targets: [battle sequence, unit stat frameworks, campaign operations]
    extraction_risks: [diagram dependency, table flattening]
    likely_quarantine_reasons: [scale transition conflicts]
    conversion_prompt_additions: [map unit resolution to abstract conflict tiers]
    review_notes: [named historical battles remain source-local]
    escalation_owner_hint: warfare_systems_owner
  magic_spell_power_compendium:
    template_id: magic_spell_power_compendium
    label: Magic Spell/Power Compendium
    description: Compendium-style spell or power lists with effect taxonomies.
    priority: 87
    detection_signals: [spell level bands, effect schools, long power catalogs]
    expected_construct_families: [ability_power_spell_technique, resource_cost_recharge_backlash, damage_condition_effect_survivability, progression_advancement_growth]
    packet_selection_targets: [power lists, casting rules, effect definitions]
    extraction_risks: [list truncation, inline symbol loss]
    likely_quarantine_reasons: [incomplete effect constraints]
    conversion_prompt_additions: [capture target, duration, cost, and constraints explicitly]
    review_notes: [donor spell names remain source-local]
    escalation_owner_hint: ability_taxonomy_owner
  gear_item_catalog:
    template_id: gear_item_catalog
    label: Gear Item Catalog
    description: Item-dense catalogs with pricing, tags, and equipment usage rules.
    priority: 68
    detection_signals: [large item tables, price lists, equipment tags]
    expected_construct_families: [gear_item_crafting_loot_economy, competency_skill_profession, resource_cost_recharge_backlash, extraction_provenance_and_handoff]
    packet_selection_targets: [item tables, usage constraints, acquisition rules]
    extraction_risks: [table flattening, unit parsing errors]
    likely_quarantine_reasons: [missing use constraints or slot assumptions]
    conversion_prompt_additions: [retain item function tags and cost semantics]
    review_notes: [brand/model names remain source-local]
    escalation_owner_hint: item_schema_owner
  map_diagram_heavy:
    template_id: map_diagram_heavy
    label: Map/Diagram Heavy
    description: Documents where map or diagram context is required for meaning.
    priority: 67
    detection_signals: [map callouts, diagram references, key legends]
    expected_construct_families: [hazard_environment_exploration_travel, scene_mission_adventure_scenario, extraction_provenance_and_handoff, world_region_faction_setting]
    packet_selection_targets: [map keys, diagram-linked procedures, navigation rules]
    extraction_risks: [map dependency, OCR-needed callouts, boundary ambiguity]
    likely_quarantine_reasons: [text not interpretable without visual context]
    conversion_prompt_additions: [mark map-dependent assertions for quarantine if unresolved]
    review_notes: [location names remain source-local]
    escalation_owner_hint: extraction_quality_owner
  scanned_or_ocr_heavy:
    template_id: scanned_or_ocr_heavy
    label: Scanned or OCR Heavy
    description: Scan-like inputs with OCR noise and layout fragmentation.
    priority: 66
    detection_signals: [low text confidence, broken glyphs, skewed page capture]
    expected_construct_families: [extraction_provenance_and_handoff, unclassified_or_mixed, hazard_environment_exploration_travel, gear_item_crafting_loot_economy]
    packet_selection_targets: [high-noise pages, repeated header/footer zones, OCR repair candidates]
    extraction_risks: [mojibake, OCR substitution errors, column bleed]
    likely_quarantine_reasons: [insufficient extraction certainty]
    conversion_prompt_additions: [prefer quarantine when semantic confidence is low]
    review_notes: [require repair queue linkage for noisy passages]
    escalation_owner_hint: ocr_pipeline_owner
  unclassified_or_mixed_donor_family:
    template_id: unclassified_or_mixed_donor_family
    label: Unclassified or Mixed Donor Family
    description: Fallback routing template when no primary donor-family template meets threshold.
    priority: 10
    fallback_only: true
    detection_signals: [mixed signatures, low-confidence family signals, unresolved hybrid structure]
    expected_construct_families: [unclassified_or_mixed, extraction_provenance_and_handoff]
    packet_selection_targets: [triage packets, representative mixed sections]
    extraction_risks: [packet boundary ambiguity, mixed layout contamination]
    likely_quarantine_reasons: [insufficient examples for stable family routing]
    conversion_prompt_additions: [route conservatively, prefer source-local or quarantine over forced normalization]
    review_notes: [use to collect evidence for new templates; not a normal target family]
    escalation_owner_hint: routing_governance_owner
