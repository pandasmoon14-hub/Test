  proposed_path: docs/doctrine/world/A14_travel_exploration_and_scale_transition_doctrine.md
  layer: 3_world_asset_conflict_spine
  phase: 1C
  status: draft
  authority_level: doctrine-draft
  owner: Astra Doctrine Council - Travel Working Group
  purpose: Define local, planetary, orbital, stellar, void, planar, and dimensional travel; routes, gates, portals, jumps, ruins, megastructures, exploration procedures, and scale transitions.
  owns:
  - travel scale taxonomy
  - transition costs/constraints
  - gate/portal/jump route stability
  - exploration procedures
  - ruin/megastructure modeling
  - scale transition preconditions/consequences
  must_not_own:
  - cosmology topology
  - specific starship stats
  - specific hazard tables
  - faction logistics
  - runtime travel state
  dependencies: &id017
  - A01
  - A05
  - A12
  - A13
  blocked_by: []
  unlocks: &id018
  - A15
  - C06
  - C07
  - C09
  - C13
  - R02
  - R07
  downstream_consumers: *id018
  donor_pressure_absorbed:
  - Traveller jump drive
  - D&D plane shift/teleport
  - Stargate networks
  - warp/hyperspace systems
  - cultivation secret realms
  - wilderness/hexcrawl procedures
  hard_refusals:
  - Traveller jump is not default FTL
  - free teleportation without limits is rejected
  - travel must not ignore hazards/cost/consequence
  - planar travel must conform to A01
  escalation_triggers:
  - new travel scale required
  - transition contradicts cosmology/resources
  - exploration procedure breaks hazards/provenance
  required_tests:
  - travel-scale contradiction test
  - gate/portal/jump boundary test
  - exploration plus hazard integration test
  - ruin/megastructure modeling test
  test_status: designed
  review_status: not_reviewed
  promotion_requirements:
  - A01-A10 relevant dependencies at least review/pressure-tested
  - all required sections present
  - pressure tests pass or escalate
  - operational/schema consumers confirm usability
  - council acceptance recorded
  scale_gate_relevance: critical
  broad_conversion_relevance: critical
  canon_relevance: high
  runtime_relevance: medium
  live_play_relevance: medium
  notes: Part of Phase 1C world/asset/conflict spine. Must not import donor combat, asset, travel, or economy defaults.
