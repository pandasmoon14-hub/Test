dependency_rules:
  hard_locks:
  - REGISTRY-001 locks all drafting beyond roadmap.
  - A01 locks A02-A05.
  - A01-A05 lock A06-A10.
  - A01-A10 lock A11-A15.
  - A01-A15 lock C00.
  - C00 locks C01-C14.
  - A01-A15 and C00 lock K01-K04.
  - K01-K04 lock K05-K06.
  - A01-A15, C00-C14, K01-K06 lock R01.
  - R01 locks R02-R08.
  - R01-R08 lock T01-T07.
  soft_locks:
  - K01 may begin as placeholder after A01-A03 have stable terminology.
  - C10 may draft early after C00 because table/oracle structure is high-pressure.
  - K04 conflict ledger may begin as draft during pressure testing.
  - Runtime brainstorming may occur before R01, but no implementation doctrine may become current before canon/schema gates.
  promotion_sequence: todo -> draft -> review -> pressure-tested -> current
  cross_layer_rule: Downstream files may consume upstream doctrine but may not redefine it.
  version_lock: Substantive amendments to current files require version bump, review return, re-pressure-test, and conflict-ledger entry.
