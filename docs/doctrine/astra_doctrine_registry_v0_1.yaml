global_status_values:
- todo
- draft
- review
- pressure-tested
- current
- blocked
- deprecated
global_layer_values:
- 0_control
- 1_setting_spine
- 2_advancement_action_spine
- 3_world_asset_conflict_spine
- 4_schema_base
- 5_canon_lexicon
- 6_runtime_backend
- 7_training_evaluation
global_phase_values:
  '0': Control and registry establishment
  1A: Setting spine (A01-A05)
  1B: Advancement/action spine (A06-A10)
  1C: World/asset/conflict spine (A11-A15)
  '2': Schema base and content-family schemas (C00-C14)
  '3': Canon and lexicon governance (K01-K06)
  '4': Runtime and backend doctrine (R01-R08)
  '5': Training and evaluation doctrine (T01-T07)
global_unlock_values:
- locked
- gated
- unlocked
- staged
- blocked
global_test_status_values:
- not_started
- designed
- executing
- passed
- failed
- escalated
- not_applicable
global_review_requirements:
  draft_to_review:
  - all_required_sections_present
  - owns_must_not_own_declared
  - mapping_rules_present
  - source_local_handling_present
  - hard_refusals_present
  - escalation_triggers_present
  - no_contradiction_with_active_control_files
  - minimum_external_reviewers_1
  review_to_pressure_tested:
  - assigned_pressure_tests_executed
  - contradictions_passed_or_escalated
  - donor_law_creep_review_passed
  - dependency_review_passed
  - lexicon_risk_assessed
  pressure_tested_to_current:
  - downstream_consumers_confirm_usability
  - no_unresolved_high_severity_conflict_ledger_entries
  - registry_updated
  - council_reviewer_acceptance_recorded
  - minimum_observation_days_14
  current_to_deprecated:
  - replacement_file_current
  - migration_path_recorded
  - downstream_references_updated
  - archive_retained
dependency_rules:
  hard_locks:
  - REGISTRY-001 locks all drafting beyond roadmap.
  - A01 locks A02-A05.
  - A01-A05 lock A06-A10.
  - A01-A10 lock A11-A15.
  - A01-A15 lock C00.
  - C00 locks C01-C14.
  - A01-A15 and C00 lock K01-K04.
  - K01-K04 lock K05-K06.
  - A01-A15, C00-C14, K01-K06 lock R01.
  - R01 locks R02-R08.
  - R01-R08 lock T01-T07.
  soft_locks:
  - K01 may begin as placeholder after A01-A03 have stable terminology.
  - C10 may draft early after C00 because table/oracle structure is high-pressure.
  - K04 conflict ledger may begin as draft during pressure testing.
  - Runtime brainstorming may occur before R01, but no implementation doctrine may become current before canon/schema gates.
  promotion_sequence: todo -> draft -> review -> pressure-tested -> current
  cross_layer_rule: Downstream files may consume upstream doctrine but may not redefine it.
  version_lock: Substantive amendments to current files require version bump, review return, re-pressure-test, and conflict-ledger entry.
scale_gates:
  broad_conversion_pilot_50:
  - A01-A15 pressure-tested or current
  - C00 current
  - C01, C02, C03, C10 pressure-tested or current
  - K01-K04 current
  - 50-packet pilot complete
  - no donor-law creep detected
  broad_conversion_full:
  - 50, 200, and 500 expansion gates passed
  - schema violation rate below accepted threshold
  - conflict ledger has no unresolved high-severity blockers
  - source-local retention and quarantine workflows functioning
  runtime_implementation:
  - A01-A15 current
  - C00-C14 current or pressure-tested
  - K01-K06 current or pressure-tested
  - R01-R04 drafted and reviewed
  - at least 500 valid conversion-intake memos available
  live_play_training:
  - R01-R08 current or pressure-tested
  - T01-T07 current or pressure-tested
  - gold examples derive only from current doctrine and accepted canon
  - at least 10 live pilot sessions with state deltas and review notes
