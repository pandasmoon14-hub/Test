    goals:
      - preserve neutral-hub function
      - rename source proper nouns into Astra-native hub terminology
      - retain service and mission-distribution logic
  travel_access_rules:
    preferred_route: deterministic_transform
    goals:
      - preserve access-gate logic
      - map token/key language into Transit Seal terminology
      - avoid decorative expansion
