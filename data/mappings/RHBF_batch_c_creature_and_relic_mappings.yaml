    class: provisional mapping awaiting later donor pressure
  weapon-shaped living weapon:
    astra_term: weapon-form Bound Relic
    class: Astra optional profile

provisional_mappings:
  Beast Core:
    astra_term: essence core
    class: provisional mapping awaiting later donor pressure
  Essence:
    astra_term: essence reserve
    class: provisional mapping awaiting later donor pressure
  Arako:
    astra_term: arako reserve
    class: provisional mapping awaiting later donor pressure
  Radiance:
    astra_term: radiance reserve
    class: provisional mapping awaiting later donor pressure
  Skill Shard:
    astra_term: technique fragment
    class: provisional mapping awaiting later donor pressure
  Domain Shard:
    astra_term: domain fragment
    class: provisional mapping awaiting later donor pressure

retain_source_local:
  - exact family immunity/vulnerability packages
  - exact Living Weapon personality table
  - exact Relic Trait material names
  - exact wondrous item names
  - exact currency denominations and symbols
  - exact trophy bonuses
  - exact Threat Level formulas
  - exact trait-cap and bearer-bonus math

blocked_from_canon_import:
  - any claim that all progression-significant treasure must use the RHBF reserve triplet
  - any claim that every bound item must be a weapon rather than a broader relic class
  - any claim that exact RHBF family vulnerability/immunity packages are universal family law
  - any move to treat named wondrous-item catalogs as the doctrinal center of Batch C
  - anti-technology ideology

validator_targets:
  actor_statblock_required_fields:
    - identity
    - family
    - attributes
    - encounter_count
    - presence_pressure
    - resistances
    - vitality
    - defense_threshold
    - speed
    - stealth
    - size
    - actions
    - passive_traits
    - attacks_or_abilities
  harvest_packet_required_fields:
    - source_identity
    - source_type
    - source_family
    - source_state
    - output_class
    - outputs
    - downstream_hooks
  natural_treasure_required_fields:
    - origin
    - rarity
    - extraction_conditions
    - stability
    - yield_tier
    - yield_channels
  bound_relic_required_fields:
    - identity
    - base_form
    - bond_state
    - owner_restriction
    - growth_state
    - growth_track
    - known_relic_traits
    - feeding_requirements
    - permitted_input_families
    - evolution_triggers

notes:
  - RHBF strongly validates typed harvest ecology, natural treasure significance, and owner-bound relic growth.
  - Family is promoted as active mechanical grammar, but default packages remain under review.
  - Reserve-triplet semantics remain provisional until wider donor pressure is tested.
