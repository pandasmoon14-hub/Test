version: 0.3
run_id: rhbf_prod_run_002

integration_rule:
  description: "Promote grammar before defaults. Preserve RHBF payload where Astra does not yet want a universal profile."
  classes:
    - Astra baseline grammar
    - Astra optional profile
    - donor-local retained structure
    - provisional mapping awaiting later donor pressure

canonical_mappings:
  Living Weapon:
    astra_term: Bound Relic
    class: Astra baseline grammar
  Living Weapon Trait:
    astra_term: Relic Trait
    class: Astra baseline grammar
  Living Weapon evolution:
    astra_term: Resonant Feeding
    class: Astra baseline grammar
  Evolved Beast:
    astra_term: Ascendant Beast
    class: Astra baseline grammar
  aura:
    astra_term: Presence Pressure
    class: Astra baseline grammar
  HP:
    astra_term: Vitality
    class: Astra baseline grammar
  DR:
    astra_term: Defense Threshold
    class: Astra baseline grammar
  Fortitude:
    astra_term: Core Resistance
    class: Astra baseline grammar
  Reflex:
    astra_term: Flow Resistance
    class: Astra baseline grammar
  Willpower:
    astra_term: Resonance Resistance
    class: Astra baseline grammar
  wondrous item:
    astra_term: wondrous asset
    class: Astra baseline grammar
  creature family:
    astra_term: active family classifier
    class: Astra baseline grammar
  family posture:
    astra_term: family posture grammar
    class: Astra baseline grammar
  resource source type:
    astra_term: resource-source ontology
    class: Astra baseline grammar

