    donor_construct: "space travel and world-to-world movement conditioned by routes, docking, support, and clearance"
    astra_mapping: "transit vector doctrine / travel-access infrastructure"
    status: baseline_grammar
    notes: "Reinforces broader travel doctrine; exact Drift assumptions remain donor-local."

  crew_roles:
    donor_construct: "captain / engineer / gunner / pilot / science officer"
    astra_mapping: "crewed platform procedure"
    status: lawful_support_family
    notes: "Lawful differentiated role family; exact role menus remain donor-local."

  starship_conflict:
    donor_construct: "phased starship combat and ship-scale crisis scenes"
