  faction_organizations:
    donor_construct: "factions and organizations at civic/interstellar scale"
    astra_mapping: "faction pressure through sponsor / claimant / regulator / custodian logic"
    status: baseline_grammar
    notes: "Exact organizations remain donor-local. The structural categories are what carry."

  hazardous_travel:
    donor_construct: "dangerous travel environments and hostile transit"
    astra_mapping: "travel hazard and transit pressure"
    status: baseline_grammar
    notes: "Reinforces that transit itself can be meaningful procedure rather than scene omission."

watchlist:
